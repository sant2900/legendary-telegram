name: Auto Fetch Jobs Daily

on:
  schedule:
    - cron: '0 0 * * *' # यह रोज रात को 12 बजे (UTC) अपने आप चलेगा
  workflow_dispatch: # इससे आप जब चाहें बटन दबाकर भी बोट को मैन्युअली चला सकते हैं

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # बोट को वेबसाइट का कोड बदलने की परमिशन देने के लिए

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Job Scraper Bot
      run: python fetch_jobs.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        git diff-index --quiet HEAD || (git commit -m "🤖 Auto-updated latest jobs" && git push)
